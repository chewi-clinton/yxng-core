# Production compose file for Dokploy. Differences from docker-compose.yml
# (local dev): no source bind-mount (runs the built image, not live-reload),
# backend runs gunicorn via its Dockerfile CMD instead of `runserver`,
# database is an external managed Postgres instance (not a bundled
# container), and every secret comes from Dokploy's own environment
# variable configuration for this project rather than the gitignored
# backend/.env / ai-service/.env files, which won't exist in a
# git-deployed checkout.
#
# Set these in Dokploy's dashboard for this project before first deploy:
#   SECRET_KEY, ALLOWED_HOSTS, GEMINI_API_KEY,
#   GEMINI_MODEL (defaults to gemini-2.5-flash-lite if unset)
#   DB_NAME, DB_USER, DB_PASSWORD, DB_HOST, DB_PORT (external Postgres)

services:
  ai-service:
    build: ./ai-service
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
    command: gunicorn -w 2 -b 0.0.0.0:5000 --timeout 60 "app:create_app()"

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      ENVIRONMENT: production
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      AI_SERVICE_URL: http://ai-service:5000
    depends_on:
      - ai-service
    expose:
      - "8000"
