services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: lifeos
      POSTGRES_USER: lifeos
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lifeos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"

  ai-service:
    build: ./ai-service
    restart: unless-stopped
    env_file: ./ai-service/.env
    ports:
      - "5001:5000"
    command: gunicorn -w 2 -b 0.0.0.0:5000 --timeout 60 "app:create_app()"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DB_HOST: postgres
      AI_SERVICE_URL: http://ai-service:5000
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - ai-service
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"

volumes:
  postgres_data:
